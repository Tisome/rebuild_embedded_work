          folders: []
        - name: FreeRTOS_CORE
          files:
            - path: Middlewares/FreeRTOS/croutine.c
            - path: Middlewares/FreeRTOS/event_groups.c
            - path: Middlewares/FreeRTOS/list.c
            - path: Middlewares/FreeRTOS/queue.c
            - path: Middlewares/FreeRTOS/stream_buffer.c
            - path: Middlewares/FreeRTOS/tasks.c
            - path: Middlewares/FreeRTOS/timers.c
          folders: []
        - name: FreeRTOS_PORT
          files:
            - path: Middlewares/FreeRTOS/portable/MemMang/heap_4.c
            - path: Middlewares/FreeRTOS/portable/RVDS/ARM_CM3/port.c
          folders: []
    - name: Readme
      files:
        - path: readme.txt
      folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 452bd260bc4be50015f83e4e1a7a5b06
targets:
  FreeRTOS:
    cppPreprocessAttrs:
      defineList:
        - USE_HAL_DRIVER
        - STM32F103xE
      incList:
        - .
        - Drivers/CMSIS/Device/ST/STM32F1xx/Include
        - Drivers/STM32F1xx_HAL_Driver/Inc
        - Drivers/CMSIS/Include
        - Drivers
        - User
        - Middlewares
        - Middlewares/FreeRTOS/include
        - Middlewares/FreeRTOS/portable/RVDS/ARM_CM3
        - .cmsis/include
        - Projects/MDK-ARM/RTE/_FreeRTOS
        - Middlewares/circular_buffer/inc
        - Middlewares/easylogger/inc
        - Middlewares/Modbus/inc
        - Middlewares/SEGGER_RTT
        - BSP/at24cxx/inc
        - BSP/KEY/inc
        - BSP/USART/inc
        - Perph/inc
        - Task/inc
        - BSP/RS485/inc
        - App/inc
        - Middlewares/easylogger/port
      libList: []
    excludeList: []
    toolchain: AC5
    toolchainConfigMap:
      AC5:
        archExtensions: ""
        cpuType: Cortex-M3
        floatingPointHardware: none
        options:
          version: 4
          afterBuildTasks: []
          asm-compiler:
            defines: []
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: --diag_suppress=1 --diag_suppress=1295
            C_FLAGS: --diag_suppress=1 --diag_suppress=1295
            c99-mode: true
            one-elf-section-per-function: true
            optimization: level-0
            warnings: all-warnings
          global:
            output-debug-info: enable
            use-microLIB: false
          linker:
            $outputTaskExcludes:
              - .bin
            output-format: elf
            ro-base: "0x08000000"
            rw-base: "0x20000000"
            xo-base: ""
        scatterFilePath: ""
        storageLayout:
          RAM:
            - id: 1
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 2
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 3
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 1
              isChecked: true
              mem:
                size: "0x10000"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
            - id: 2
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 3
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 1
              isChecked: true
              isStartup: true
              mem:
                size: "0x80000"
                startAddr: "0x8000000"
              tag: IROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: IROM
        useCustomScatterFile: false
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
    uploader: JLink
